<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results - Yoopedia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="result.css" />
  </head>
  <body>

    <header>
      <div class="leftSide">
        <a href="/frontend/index/index.html" class="homeBtn">
          <span class="siteName">Yoopedia</span>
        </a>
      </div>

      <div class="midl">
        <div class="searchBar">
          <i class="fa-solid fa-magnifying-glass searchIcon"></i>
          <input type="search" value="ssk" placeholder="Search Yoopedia..." />
          <span class="filterLabel">ctrl + R</span>
        </div>
      </div>

      <div class="rightSide">
        <button class="iconBtn" title="suggest Article">
          <i class="fa-solid fa-lightbulb"></i>
        </button>
        <button class="iconBtn" title="open-ser">
          <i class="fa-solid fa-code"></i>
        </button>
      </div>
    </header>

    <main>
      <p class="resultsInfo">
        Search for <strong>"ssk"</strong> yielded results
      </p>

      <div class="result5">
        <ol>
          
        </ol>
      </div>

      <div class="line"></div>

      <div class="pages">
        <button class="active">1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <span>. . .</span>
        <button>10</button>
      </div>
    </main>

    <footer>

    </footer>
<script type="module" src="result.js"></script>
